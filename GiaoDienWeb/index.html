<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Trình phát nhạc cá nhân cao cấp. Tạo playlist, tận hưởng âm thanh chất lượng cao.">
    <title>Nhạc của Boo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff758c">
    
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nhạc của Boo">
</head>
<body data-theme="light">
    <div class="app-container">
        <header class="header-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h2 class="section-title" style="margin: 0;">Thư viện của bạn</h2>
                <button id="themeToggle" class="btn-icon" style="font-size: 22px;" onclick="toggleTheme()" title="Đổi giao diện Sáng/Tối">🌙</button>
            </div>
            
            <div class="playlist-controls">
                <input type="text" id="newPlaylistName" placeholder="Tên Playlist mới..." class="input-premium">
                <button class="btn-primary" onclick="createPlaylist()">Tạo mới</button>
            </div>
            <div id="playlistContainer" class="playlist-scroll-x"></div>
        </header>

        <section class="search-section" style="margin-bottom: 30px;">
            <div style="display: flex; gap: 10px;">
                <input type="text" id="searchInput" placeholder="Bạn muốn nghe gì hôm nay?" class="input-premium" style="flex: 1;">
                <button class="btn-primary" onclick="searchMusic()">Tìm kiếm</button>
            </div>
        </section>

        <main id="main-content">
            <div class="view-header">
                <h2 id="currentListTitle" class="section-title" style="margin: 0;">Trang chủ</h2>
                <div id="listActions"></div> 
            </div>
            <div id="results"></div>
        </main>
    </div>

    <div id="playlistModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h3 class="section-title" style="margin-top: 0; font-size: 20px;">Lưu vào danh sách</h3>
            <div id="modalPlaylistList"></div>
        </div>
    </div>

    <div class="visualizer-container">
        <canvas id="visualizer"></canvas>
    </div>

    <footer class="player-bar glass-effect">
        <audio id="audioPlayer"></audio>

        <div class="now-playing">
            <img id="playerThumb" src="" alt="Album Art">
            <div class="now-playing-info">
                <h4 id="playerTitle">Chưa phát nhạc</h4>
                <p id="playerAuthor">Khám phá giai điệu mới</p>
            </div>
        </div>

        <div class="player-controls">
            <div class="control-buttons">
                <button class="btn-icon" id="shuffleBtn" onclick="toggleShuffle()" title="Trộn bài ngẫu nhiên">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>
                </button>
                
                <button class="btn-icon" onclick="playPrevious()" title="Bài trước">⏮&#xFE0E;</button>
                <button class="btn-icon btn-play-circle" id="playPauseBtn" onclick="togglePlay()" title="Phát/Dừng">▶&#xFE0E;</button>
                <button class="btn-icon" onclick="autoPlayNext()" title="Bài tiếp">⏭&#xFE0E;</button>
                
                <button class="btn-icon" id="repeatBtn" onclick="toggleRepeat()" title="Lặp lại danh sách">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
                </button>
            </div>
            <div class="progress-wrapper">
                <span id="currentTimeDisplay">0:00</span>
                <input type="range" id="progressBar" value="0" min="0" max="100" step="0.1" style="--progress: 0%; flex: 1;">
                <span id="totalTimeDisplay">0:00</span>
            </div>
        </div>
        
        <div class="volume-controls">
            <span id="volume-icon" style="font-size: 18px;">🔊</span>
            <input type="range" id="volumeBar" value="100" min="0" max="100" style="--progress: 100%; width: 100px;">
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
